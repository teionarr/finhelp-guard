# Two lanes:
#   unit        — deterministic, no keys, no spend. The fast lane / the badge.
#   integration — installs the real Guardrails AI framework and runs our rails
#                 inside a standard Guard(). Heavier; kept separate so a churny
#                 framework dep can't break the core lane.
name: tests
on:
  push: { branches: [main] }
  pull_request:
permissions:
  contents: read
jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: lint (ruff)
        run: ruff check finhelp_guard evals tests
      - name: unit tests (integration test auto-skips without guardrails)
        run: pytest -q
      - name: eval gate (dev must be GREEN)
        run: python evals/run_evals.py
      - name: gate catches a regression (must be RED)
        run: |
          if python evals/run_evals.py --inject-regression; then
            echo "regression was NOT caught — gate is broken" && exit 1
          else
            echo "gate correctly went red on the injected regression"
          fi
      - name: paired McNemar comparison (informational)
        run: python evals/run_evals.py --compare

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-integration.txt
      - name: rails inside real Guard() + dense/hybrid retrieval with real embeddings
        run: pytest -q tests/test_guardrails_integration.py tests/test_dense_integration.py
